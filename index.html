<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>松韻前導問卷分析報告</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#faf9f6;min-height:100vh;display:flex;align-items:center;justify-content:center}
#lock-screen{text-align:center;padding:40px 24px;max-width:400px;width:100%}
#lock-screen h1{font-family:'Noto Serif TC',serif;font-size:36px;color:#1a1a1a;margin-bottom:8px;letter-spacing:0.04em}
#lock-screen p{color:#787878;font-size:14px;margin-bottom:32px}
.lock-icon{width:64px;height:64px;margin:0 auto 24px;background:#e8f5e7;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lock-icon svg{width:28px;height:28px;stroke:#3a6639;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.input-wrap{position:relative;margin-bottom:16px}
.input-wrap input{width:100%;padding:14px 48px 14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:'Noto Sans TC',sans-serif;background:#fff;transition:border-color 0.2s;outline:none}
.input-wrap input:focus{border-color:#5a9e57}
.input-wrap button{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:none;background:#3a6639;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.input-wrap button:hover{background:#2a4a2a}
.input-wrap button svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
#error-msg{color:#c45c4a;font-size:13px;min-height:20px;margin-bottom:8px;opacity:0;transition:opacity 0.3s}
#error-msg.show{opacity:1}
.hint{color:#9e9e9e;font-size:12px}
#report-container{display:none}

/* Loading animation */
#loading{display:none;text-align:center;padding:40px}
#loading .spinner{width:40px;height:40px;border:3px solid #e8f5e7;border-top-color:#3a6639;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#787878;font-size:14px}
</style>
</head>
<body>

<div id="lock-screen">
  <div class="lock-icon">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>松韻</h1>
  <p>前導問卷分析報告 — 需要密碼才能檢視</p>
  <div id="error-msg">密碼錯誤，請重新輸入</div>
  <div class="input-wrap">
    <input type="password" id="pwd-input" placeholder="請輸入密碼" autocomplete="off">
    <button onclick="unlock()" aria-label="解鎖">
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
  <p class="hint">輸入後按 Enter 或點擊箭頭</p>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>正在解密報告內容⋯</p>
</div>

<div id="report-container"></div>

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function unlock() {
  const pwd = document.getElementById('pwd-input').value;
  if (!pwd) return;

  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    // Decode base64
    const raw = Uint8Array.from(atob(ENCRYPTED_DATA), c => c.charCodeAt(0));

    // Extract salt (16), iv (12), tag (16), ciphertext
    const salt = raw.slice(0, 16);
    const iv = raw.slice(16, 28);
    const tag = raw.slice(28, 44);
    const ciphertext = raw.slice(44);

    // In Web Crypto, AES-GCM expects tag appended to ciphertext
    const combined = new Uint8Array(ciphertext.length + tag.length);
    combined.set(ciphertext);
    combined.set(tag, ciphertext.length);

    const key = await deriveKey(pwd, salt);

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      key,
      combined
    );

    const html = new TextDecoder().decode(decrypted);

    // Hide loading, show report
    document.getElementById('loading').style.display = 'none';

    // Parse the decrypted HTML and inject it
    const container = document.getElementById('report-container');
    container.style.display = 'block';
    document.body.style.display = 'block';
    document.body.style.alignItems = '';
    document.body.style.justifyContent = '';

    // Extract body content and scripts from the decrypted HTML
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Copy styles
    doc.querySelectorAll('style').forEach(s => {
      const style = document.createElement('style');
      style.textContent = s.textContent;
      document.head.appendChild(style);
    });

    // Load external scripts (Chart.js) then inject content
    const chartScript = document.createElement('script');
    chartScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
    chartScript.onload = () => {
      // Inject body content
      container.innerHTML = doc.body.innerHTML;

      // Execute inline scripts
      doc.querySelectorAll('script:not([src])').forEach(s => {
        const script = document.createElement('script');
        script.textContent = s.textContent;
        document.body.appendChild(script);
      });
    };
    document.head.appendChild(chartScript);

  } catch (e) {
    // Decryption failed = wrong password
    document.getElementById('loading').style.display = 'none';
    document.getElementById('lock-screen').style.display = 'block';
    errEl.classList.add('show');
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}
</script>
